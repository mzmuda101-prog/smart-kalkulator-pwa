<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kalkulator Matm0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    <meta name="application-name" content="Kalkulator Matm0">
    <meta name="format-detection" content="telephone=no">
    <meta name="description" content="Szwajcarski scyzoryk do obliczeń codziennych i technicznych">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Kalkulator by Matm0</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ============================================================
    [EN] App Header
    ============================================================ -->
    <header class="app-header">
        <div class="header-row">
            <img class="brand-mark" src="logo-mateusz-transparent.png" width="38" height="38" alt="" aria-hidden="true" style="width:38px;height:38px;max-width:38px;object-fit:contain;">
            <div class="brand-copy">
                <h1>Kalkulator by Matm0</h1>
                <p class="subtitle">Szwajcarski scyzoryk do obliczeń</p>
            </div>
            <div class="header-actions">
                <button class="install-btn" id="installAppBtn" type="button" aria-label="Zainstaluj aplikację" title="Zainstaluj aplikację" hidden>📲</button>
                <button class="cache-refresh-btn" id="cacheRefreshBtn" type="button" aria-label="Odśwież cache aplikacji" title="Odśwież cache">
                    <img src="logo-refresh.png" width="28" height="28" alt="" aria-hidden="true" style="width:28px;height:28px;max-width:28px;object-fit:contain;">
                </button>
            </div>
        </div>
    </header>

    <!-- ============================================================
    [EN] Tab Navigation
    ============================================================ -->
    <nav class="tab-nav" role="tablist">
        <button class="tab-btn active" data-tab="calculator" role="tab" aria-selected="true">
            <span class="tab-icon">🧮</span> Standard
        </button>
        <button class="tab-btn" data-tab="engineering" role="tab" aria-selected="false">
            <span class="tab-icon">📐</span> Inżynieria
        </button>
        <button class="tab-btn" data-tab="graph" role="tab" aria-selected="false">
            <span class="tab-icon">📈</span> Wykresy
        </button>
        <button class="tab-btn" data-tab="constants" role="tab" aria-selected="false">
            <span class="tab-icon">📊</span> Moje Stałe
        </button>
    </nav>

    <!-- ============================================================
    [EN] Main Content
    ============================================================ -->
    <main class="panels">

        <!-- ==================== PANEL: Standard Calculator ==================== -->
        <section id="panel-calculator" class="panel active" role="tabpanel">
            <div class="card">
                <div class="calc-display">
                    <div class="calc-expression" id="calcExpr" aria-live="polite"></div>
                    <div class="calc-result" id="calcResult" aria-live="polite">0</div>
                </div>
                <div class="calc-grid" id="calcGrid">
                    <!-- [EN] Buttons generated by JS for clean structure -->
                </div>
                <div class="calc-tools">
                    <button class="history-open-btn" id="openHistory" type="button" aria-controls="historyDrawer" aria-expanded="false">
                        <span>📋 Historia</span>
                        <span class="history-count" id="historyCount">0</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- ==================== PANEL: Engineering ==================== -->
        <section id="panel-engineering" class="panel" role="tabpanel">
            <div class="card">
                <div class="card-header"><span class="icon">📐</span> Parametry podziału</div>

                <div class="input-group">
                    <label>Jednostka</label>
                    <div class="unit-toggle" id="unitToggle">
                        <button class="unit-btn active" data-unit="cm">cm</button>
                        <button class="unit-btn" data-unit="mm">mm</button>
                        <button class="unit-btn" data-unit="m">m</button>
                    </div>
                </div>

                <div class="input-group">
                    <label>Długość całkowita</label>
                    <input type="number" id="engLength" value="100" min="0" step="any" inputmode="decimal" placeholder="np. 100">
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>Liczba podziałów</label>
                        <input type="number" id="engCount" value="3" min="1" max="100" step="1" inputmode="numeric" placeholder="np. 3">
                    </div>
                    <div class="input-group">
                        <label>Orientacja</label>
                        <div class="axis-toggle" id="axisToggle">
                            <button class="axis-btn active" data-axis="X">⬌ Poziomo</button>
                            <button class="axis-btn" data-axis="Y">⬍ Pionowo</button>
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label>Sposób rozmieszczenia</label>
                    <div class="mode-toggle" id="spacingModeToggle">
                        <button class="mode-btn active" data-mode="between" type="button">W polu</button>
                        <button class="mode-btn" data-mode="edges" type="button">Od krańców</button>
                        <button class="mode-btn" data-mode="fixed" type="button">Stały odstęp</button>
                    </div>
                </div>

                <div class="input-group fixed-spacing-group" id="fixedSpacingGroup">
                    <label>Stały odstęp między podziałami</label>
                    <input type="number" id="engSpacing" value="20" min="0" step="any" inputmode="decimal" placeholder="np. 20">
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>Margines początkowy</label>
                        <div class="input-with-sign">
                            <input type="text" id="engMarginStart" value="0" step="any" inputmode="decimal" placeholder="np. 5" autocomplete="off">
                            <button class="sign-toggle" data-target="engMarginStart" type="button" aria-label="Odwróć znak">±</button>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Margines końcowy</label>
                        <div class="input-with-sign">
                            <input type="text" id="engMarginEnd" value="0" step="any" inputmode="decimal" placeholder="np. 5" autocomplete="off">
                            <button class="sign-toggle" data-target="engMarginEnd" type="button" aria-label="Odwróć znak">±</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <span class="icon">🎨</span> Wizualizacja
                    <span class="zoom-controls" id="zoomControls">
                        <button class="zoom-btn" id="zoomOutBtn" type="button" aria-label="Pomniejsz">−</button>
                        <span class="zoom-label" id="zoomLabel">100%</span>
                        <button class="zoom-btn" id="zoomInBtn" type="button" aria-label="Powiększ">+</button>
                        <button class="zoom-btn zoom-reset" id="zoomResetBtn" type="button" aria-label="Resetuj widok">↺</button>
                    </span>
                </div>
                <div class="canvas-container" id="canvasContainer">
                    <canvas id="engCanvas" width="900" height="450" aria-label="Wizualizacja rozmieszczenia podziałów" role="img"></canvas>
                </div>
                <div class="eng-result" id="engResult" aria-live="polite"></div>
            </div>
        </section>

        <!-- ==================== PANEL: Graph / Easy Math Lines ==================== -->
        <section id="panel-graph" class="panel" role="tabpanel">
            <div class="card">
                <div class="card-header"><span class="icon">📈</span> Wykresy i szybkie podziały</div>

                <div class="input-group">
                    <label>Komenda albo funkcja</label>
                    <input type="text" id="graphCommand" value="f(x)=sin(x)" inputmode="text" autocomplete="off" placeholder="np. f(x)=x^2-4 albo podziel 120 na 4 w polu y=-1">
                </div>

                <div class="graph-examples">
                    <button class="example-chip" data-command="f(x)=sin(x)" type="button">sin(x)</button>
                    <button class="example-chip" data-command="f(x)=x^2-4" type="button">x^2 - 4</button>
                    <button class="example-chip" data-command="podziel 120 na 4 w polu y=-1" type="button">podziel 120 na 4</button>
                    <button class="example-chip" data-command="od 0 do 120 co 20 y=0" type="button">co 20</button>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>X od</label>
                        <input type="number" id="graphXMin" value="-10" step="any" inputmode="decimal">
                    </div>
                    <div class="input-group">
                        <label>X do</label>
                        <input type="number" id="graphXMax" value="10" step="any" inputmode="decimal">
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>Y od</label>
                        <input type="number" id="graphYMin" value="-10" step="any" inputmode="decimal">
                    </div>
                    <div class="input-group">
                        <label>Y do</label>
                        <input type="number" id="graphYMax" value="10" step="any" inputmode="decimal">
                    </div>
                </div>

                <button class="btn btn-primary" id="graphDrawBtn" type="button">📈 Rysuj</button>
            </div>

            <div class="card">
                <div class="card-header"><span class="icon">✳️</span> Kreator podziału osi X</div>

                <div class="input-row">
                    <div class="input-group">
                        <label>Długość / koniec X</label>
                        <input type="number" id="graphDivideLength" value="120" min="0" step="any" inputmode="decimal">
                    </div>
                    <div class="input-group">
                        <label>Liczba punktów</label>
                        <input type="number" id="graphDivideCount" value="4" min="1" max="200" step="1" inputmode="numeric">
                    </div>
                </div>

                <div class="input-group">
                    <label>Sposób podziału</label>
                    <div class="mode-toggle" id="graphDivideMode">
                        <button class="mode-btn active" data-mode="between" type="button">W polu</button>
                        <button class="mode-btn" data-mode="edges" type="button">Od krańców</button>
                        <button class="mode-btn" data-mode="fixed" type="button">Stały odstęp</button>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>Margines start</label>
                        <input type="number" id="graphDivideStartMargin" value="0" step="any" inputmode="decimal">
                    </div>
                    <div class="input-group">
                        <label>Margines koniec</label>
                        <input type="number" id="graphDivideEndMargin" value="0" step="any" inputmode="decimal">
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label>Stały odstęp</label>
                        <input type="number" id="graphDivideSpacing" value="20" min="0" step="any" inputmode="decimal">
                    </div>
                    <div class="input-group">
                        <label>Wysokość Y</label>
                        <input type="number" id="graphDivideY" value="-1" step="any" inputmode="decimal">
                    </div>
                </div>

                <button class="btn btn-primary" id="graphBuildDivideBtn" type="button">✳️ Zrób punkty</button>
            </div>

            <div class="card">
                <div class="card-header"><span class="icon">🧭</span> Oś X/Y</div>
                <div class="graph-canvas-wrap">
                    <canvas id="graphCanvas" width="900" height="520" aria-label="Wykres funkcji i punktów" role="img"></canvas>
                </div>
                <div class="eng-result graph-result" id="graphResult" aria-live="polite"></div>
            </div>
        </section>

        <!-- ==================== PANEL: My Constants ==================== -->
        <section id="panel-constants" class="panel" role="tabpanel">
            <div class="card">
                <div class="card-header"><span class="icon">➕</span> Dodaj stałą</div>
                <div class="const-form" id="constForm">
                    <div class="const-form-row">
                        <input type="text" id="constName" placeholder="Nazwa (np. Cena stali)" maxlength="40" aria-label="Nazwa stałej">
                        <input type="number" id="constValue" placeholder="Wartość" step="any" inputmode="decimal" aria-label="Wartość stałej">
                        <input type="text" id="constUnit" placeholder="j.m." maxlength="10" aria-label="Jednostka stałej">
                    </div>
                    <button class="btn btn-primary" id="addConstBtn">💾 Zapisz stałą</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header"><span class="icon">📊</span> Moje Stałe</div>
                <ul class="const-list" id="constList">
                    <li class="empty-state">
                        <div class="icon">📭</div>
                        <p>Brak zdefiniowanych stałych</p>
                    </li>
                </ul>
            </div>
        </section>

    </main>

    <!-- ============================================================
    [EN] Slide-up History Drawer
    ============================================================ -->
    <div class="history-backdrop" id="historyBackdrop" aria-hidden="true"></div>
    <aside class="history-drawer" id="historyDrawer" aria-hidden="true" aria-labelledby="historyDrawerTitle">
        <div class="drawer-handle" aria-hidden="true"></div>
        <div class="history-header">
            <h3 id="historyDrawerTitle">📋 Historia obliczeń</h3>
            <div class="history-actions">
                <button class="history-clear-btn" id="clearHistory" type="button">Wyczyść</button>
                <button class="history-close-btn" id="closeHistory" type="button" aria-label="Zamknij historię">×</button>
            </div>
        </div>
        <ul class="history-list" id="historyList">
            <li class="empty-state">
                <div class="icon">📝</div>
                <p>Brak historii — zacznij liczyć!</p>
            </li>
        </ul>
    </aside>

    <!-- ============================================================
    [EN] Toast Notification
    ============================================================ -->
    <div class="toast" id="toast" aria-live="assertive"></div>

    <script src="app.js"></script>
</body>
</html>
